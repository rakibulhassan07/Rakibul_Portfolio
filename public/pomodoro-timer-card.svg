<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="760" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0F19"/>
      <stop offset="1" stop-color="#121826"/>
    </linearGradient>
    <linearGradient id="accent" x1="250" y1="170" x2="550" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="glow" x="180" y="100" width="440" height="440" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <circle cx="400" cy="300" r="260" fill="#111827" fill-opacity="0.55"/>

  <g filter="url(#glow)">
    <circle cx="400" cy="300" r="155" stroke="#1F2937" stroke-width="26"/>
    <path d="M400 145 A155 155 0 1 1 251 342" stroke="url(#accent)" stroke-width="26" stroke-linecap="round"/>
  </g>

  <circle cx="400" cy="300" r="120" fill="#0F172A"/>
  <circle cx="400" cy="300" r="116" stroke="#334155" stroke-opacity="0.65"/>

  <text x="400" y="290" text-anchor="middle" fill="#E5E7EB" font-size="64" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">25:00</text>
  <text x="400" y="332" text-anchor="middle" fill="#94A3B8" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="2">FOCUS SESSION</text>

  <rect x="282" y="356" width="236" height="14" rx="7" fill="#1E293B"/>
  <rect x="282" y="356" width="162" height="14" rx="7" fill="url(#accent)"/>

  <circle cx="180" cy="125" r="4" fill="#F97316"/>
  <circle cx="640" cy="470" r="3" fill="#F97316" fill-opacity="0.8"/>
  <circle cx="670" cy="145" r="2.5" fill="#EF4444" fill-opacity="0.75"/>
  <circle cx="150" cy="455" r="3.5" fill="#EF4444" fill-opacity="0.7"/>
